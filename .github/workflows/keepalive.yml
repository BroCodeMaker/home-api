name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HomeAPI
        run: |
          curl -sf https://home-api-fhvj.onrender.com/health && echo "Server awake" || echo "Server not responding"
