services:
  - type: web
    name: home-api
    runtime: python
    pythonVersion: "3.11.10"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TUYA_CLIENT_ID
        sync: false
      - key: TUYA_CLIENT_SECRET
        sync: false
      - key: API_KEY
        sync: false
    healthCheckPath: /health

  - type: cron
    name: keepalive
    runtime: python
    pythonVersion: "3.11.10"
    schedule: "*/10 * * * *"
    buildCommand: pip install requests
    startCommand: python -c "import requests; r=requests.get('https://home-api-fhvj.onrender.com/health'); print(r.status_code)"
